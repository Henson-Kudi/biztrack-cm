appId: cm.biztrack.desktop
productName: BizTrack CM
npmRebuild: false
copyright: "Copyright (c) 2025 BizTrack CM"

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - assets/**/*
  - package.json

win:
  artifactName: ${productName}-Setup-${version}.${ext}
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.business

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: BizTrack CM
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

publish:
  provider: github
  owner: Henson-Kudi
  repo: biztrack-cm
