$kind: http-request
url: "{{baseUrl}}/sync"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "deviceId": "device-123",
      "lastSyncedAt": null,
      "changes": {
        "products": [
          {
            "id": "00000000-0000-0000-0000-000000000000",
            "updatedAt": "2026-03-28T10:00:00.000Z",
            "isDeleted": false
          }
        ],
        "productCategories": []
      }
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
order: 1000
