packages:
  - "apps/*"
  - "packages/*"

# Dependency version overrides (moved here from package.json — pnpm v11+)
overrides:
  react: "19.2.4"
  react-dom: "19.2.4"
  "@types/react": "^19.0.0"
  "@types/react-dom": "^19.0.0"

# pnpm v11 requires explicitly approving packages that run install scripts.
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@swc/core': true
  better-sqlite3: true
  electron: true
  esbuild: true
  lzma-native: true
  msgpackr-extract: true
  sharp: true
